trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.11'

steps:

# Checkout source code
- checkout: self

# Use Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(pythonVersion)'
  displayName: 'Use Python $(pythonVersion)'

# Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install Dependencies'

# ==========================
# DEBUG STEP
# ==========================
- script: |
    echo "========================================="
    echo "Current Working Directory"
    echo "========================================="
    pwd

    echo ""
    echo "========================================="
    echo "Repository Files"
    echo "========================================="
    find .

    echo ""
    echo "========================================="
    echo "Python Version"
    echo "========================================="
    python --version

    echo ""
    echo "========================================="
    echo "Contents of app.py"
    echo "========================================="
    cat app.py

    echo ""
    echo "========================================="
    echo "Contents of tests/test_app.py"
    echo "========================================="
    cat tests/test_app.py

    echo ""
    echo "========================================="
    echo "Import Test"
    echo "========================================="
    python -c "import app; print('App imported successfully')"

  displayName: 'Debug Repository'

# ==========================
# RUN UNIT TESTS
# ==========================
- script: |
    export PYTHONPATH=$(Build.SourcesDirectory)
    pytest tests -v --junitxml=test-results.xml
  displayName: 'Run Unit Tests'

# Publish test results
- task: PublishTestResults@2
  inputs:
    testResultsFiles: 'test-results.xml'
    testRunTitle: 'Flask Unit Tests'
    failTaskOnFailedTests: true
  displayName: 'Publish Test Results'

# Archive application
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/website.zip'
    replaceExistingArchive: true
  displayName: 'Create ZIP Package'

# Publish build artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/website.zip'
    ArtifactName: 'Website'
  displayName: 'Publish Build Artifact'

# Deploy to Azure App Service
- task: AzureWebApp@1
  displayName: 'Deploy to Azure Web App'
  inputs:
    azureSubscription: 'sp_github'
    appType: 'webAppLinux'
    appName: 'mywebappblaze'
    package: '$(Build.ArtifactStagingDirectory)/website.zip'
